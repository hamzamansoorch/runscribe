name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Type-check
        run: mypy
      - name: Test
        run: pytest -q

  package:
    # Build the wheel, install ONLY that wheel (no source tree), and import every
    # subpackage. Catches packaging regressions like a subpackage missing from the
    # distribution — which a source/editable install would silently hide.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
      - name: Install the wheel into a clean venv and import all subpackages
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/python -m pip install dist/*.whl
          /tmp/venv/bin/python -c "import runscribe, runscribe.build, runscribe.record, runscribe.redact, runscribe.run; print('all subpackages import OK')"
          /tmp/venv/bin/runscribe --version
